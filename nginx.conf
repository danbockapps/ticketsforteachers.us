# nginx server block for ticketsforteachers.us — pure static, no runtime.
# Place site files under /var/www/ticketsforteachers/site (the `site/` dir from this repo).
#
# Deploy:
#   sudo cp -r site /var/www/ticketsforteachers/site
#   sudo cp nginx.conf /etc/nginx/sites-available/ticketsforteachers
#   sudo ln -s /etc/nginx/sites-available/ticketsforteachers /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then add TLS:
#   sudo certbot --nginx -d ticketsforteachers.us -d www.ticketsforteachers.us

server {
    listen 80;
    listen [::]:80;
    server_name ticketsforteachers.us www.ticketsforteachers.us;

    root /var/www/ticketsforteachers/site;
    index index.html;

    # canonicalize www -> apex
    if ($host = www.ticketsforteachers.us) {
        return 301 $scheme://ticketsforteachers.us$request_uri;
    }

    # preserve the old WordPress about-page slug
    location = /91-2/ { return 301 /about/; }
    location = /91-2  { return 301 /about/; }

    # pretty /about -> /about/ (served from about/index.html)
    location = /about { return 301 /about/; }

    # static file serving; query strings on asset URLs (?ver=) are ignored automatically
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # long cache for fingerprinted/static assets
    location ~* \.(?:css|js|png|jpe?g|gif|svg|woff2?|ttf|eot|ico|webp|gif)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
